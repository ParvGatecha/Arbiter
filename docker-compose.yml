version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: arbiter_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-arbiter}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - arbiter_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: arbiter_redis
    ports:
      - "6379:6379"
    networks:
      - arbiter_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: arbiter_backend_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-arbiter}
      - REDIS_URL=redis://redis:6379/0
      - JUDGE_PROVIDER=${JUDGE_PROVIDER}
      - JUDGE_MODEL=${JUDGE_MODEL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway" # Access local Ollama running on host machine
    volumes:
      - ./backend:/workspace
    networks:
      - arbiter_network

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: arbiter_celery_worker_node
    command: celery -A app.core.celery_app.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-arbiter}
      - REDIS_URL=redis://redis:6379/0
      - JUDGE_PROVIDER=${JUDGE_PROVIDER}
      - JUDGE_MODEL=${JUDGE_MODEL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend:/workspace
    networks:
      - arbiter_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
    container_name: arbiter_frontend_app
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - arbiter_network

volumes:
  postgres_data:

networks:
  arbiter_network:
    name: arbiter_network
