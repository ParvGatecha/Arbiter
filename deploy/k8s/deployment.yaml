apiVersion: v1
kind: Namespace
metadata:
  name: arbiter
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: arbiter-config
  namespace: arbiter
data:
  DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres-service:5432/arbiter"
  REDIS_URL: "redis://redis-service:6379/0"
  JUDGE_PROVIDER: "openai"
  JUDGE_MODEL: "gpt-4o-mini"
  THREAT_INTEL_URL: "https://signatures.arbiter.ai/v1"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: arbiter-backend
  namespace: arbiter
  labels:
    app: arbiter-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: arbiter-backend
  template:
    metadata:
      labels:
        app: arbiter-backend
    spec:
      containers:
      - name: backend
        image: StarkCorp/arbiter-backend:latest
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: arbiter-config
        resources:
          limits:
            cpu: "1"
            memory: 1Gi
          requests:
            cpu: "250m"
            memory: 512Mi
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: arbiter-gateway
  namespace: arbiter
  labels:
    app: arbiter-gateway
spec:
  replicas: 3
  selector:
    matchLabels:
      app: arbiter-gateway
  template:
    metadata:
      labels:
        app: arbiter-gateway
    spec:
      containers:
      - name: gateway
        image: StarkCorp/arbiter-gateway:latest
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: arbiter-config
        resources:
          limits:
            cpu: "2"
            memory: 2Gi
          requests:
            cpu: "500m"
            memory: 1Gi
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: arbiter-celery-worker
  namespace: arbiter
  labels:
    app: arbiter-celery-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: arbiter-celery-worker
  template:
    metadata:
      labels:
        app: arbiter-celery-worker
    spec:
      containers:
      - name: celery-worker
        image: StarkCorp/arbiter-backend:latest
        command: ["celery", "-A", "backend.app.tasks.evaluation", "worker", "--loglevel=info"]
        envFrom:
        - configMapRef:
            name: arbiter-config
        resources:
          limits:
            cpu: "2"
            memory: 4Gi
          requests:
            cpu: "500m"
            memory: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: arbiter
spec:
  ports:
  - port: 8000
    targetPort: 8000
    name: http
  selector:
    app: arbiter-backend
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: arbiter
spec:
  ports:
  - port: 80
    targetPort: 8080
    name: http
  selector:
    app: arbiter-gateway
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: arbiter
spec:
  ports:
  - port: 6379
    targetPort: 6379
  selector:
    app: redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: arbiter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7.0-alpine
        ports:
        - containerPort: 6379
        resources:
          limits:
            cpu: "500m"
            memory: 512Mi
          requests:
            cpu: "100m"
            memory: 256Mi
