version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: arbiter_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: arbiter
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: arbiter_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arbiter_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/arbiter
      - REDIS_URL=redis://redis:6379/0
      - JUDGE_PROVIDER=ollama
      - JUDGE_MODEL=llama3
      - OLLAMA_URL=http://ollama:11434
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/workspace

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arbiter_celery_worker
    command: celery -A app.core.celery_app.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/arbiter
      - REDIS_URL=redis://redis:6379/0
      - JUDGE_PROVIDER=ollama
      - JUDGE_MODEL=llama3
      - OLLAMA_URL=http://ollama:11434
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/workspace

volumes:
  postgres_data:
